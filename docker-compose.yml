services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      # Allow browser cross-origin PUT (direct-to-S3 upload) + GET from the web app.
      - MINIO_API_CORS_ALLOW_ORIGIN=*
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 2s
      retries: 20

  # Create the bucket and allow anonymous read (presigned GET also works, this is
  # a belt-and-suspenders fallback for display URLs).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/pixshar;
      mc anonymous set download local/pixshar;
      echo 'MinIO init complete';
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./prod.db
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=http://localhost:3001
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - S3_ENDPOINT=http://minio:9000
      # Host the browser uses for presigned URLs (direct-to-S3 upload + display).
      - S3_PUBLIC_ENDPOINT=http://localhost:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=pixshar
      - S3_REGION=us-east-1
      - S3_PUBLIC_URL=http://localhost:9000/pixshar
      - API_PORT=3001
      - API_URL=http://localhost:3001
      - WEB_URL=http://localhost:3000
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - api-db:/app/apps/api/prisma
    # The image drops to a non-root user, but the named DB volume is root-owned,
    # so SQLite can't create prod.db. Run as root for the local dev stack.
    user: "0:0"
    entrypoint: >
      /bin/sh -c "
      set -e;
      cd /app/apps/api && bunx prisma migrate deploy && bun prisma/seed.ts && bun run start;
      "

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:3001
    depends_on:
      - api

volumes:
  minio-data:
  api-db:
