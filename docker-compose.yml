services:
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=pixshar
      - POSTGRES_PASSWORD=pixshar
      - POSTGRES_DB=pixshar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixshar -d pixshar"]
      interval: 2s
      timeout: 2s
      retries: 20

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      # Allow browser cross-origin PUT (direct-to-S3 upload) + GET from the web app.
      - MINIO_API_CORS_ALLOW_ORIGIN=*
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 2s
      retries: 20

  # Create the bucket and allow anonymous read (presigned GET also works, this is
  # a belt-and-suspenders fallback for display URLs).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/pixshar;
      mc anonymous set download local/pixshar;
      echo 'MinIO init complete';
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://pixshar:pixshar@postgres:5432/pixshar?schema=public
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=http://localhost:3001
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - S3_ENDPOINT=http://minio:9000
      # Host the browser uses for presigned URLs (direct-to-S3 upload + display).
      - S3_PUBLIC_ENDPOINT=http://localhost:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=pixshar
      - S3_REGION=us-east-1
      - S3_PUBLIC_URL=http://localhost:9000/pixshar
      - API_PORT=3001
      - API_URL=http://localhost:3001
      - WEB_URL=http://localhost:3000
    depends_on:
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -e;
      cd /app/apps/api && bunx prisma migrate deploy && bun prisma/seed.ts && bun run start;
      "

  image-processor:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: >
      /bin/sh -c "cd /app/apps/api && bun run start:worker"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://pixshar:pixshar@postgres:5432/pixshar?schema=public
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=http://localhost:3001
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - S3_ENDPOINT=http://minio:9000
      - S3_PUBLIC_ENDPOINT=http://localhost:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=pixshar
      - S3_REGION=us-east-1
      - S3_PUBLIC_URL=http://localhost:9000/pixshar
      - API_PORT=4000
      - API_URL=http://localhost:3001
      - WEB_URL=http://localhost:3000
      - WORKER_CONCURRENCY=2
      - WORKER_METRICS_PORT=4000
      - PROCESS_MIN_AGE_MS=3000
      - PROCESS_MAX_ATTEMPTS=4
      - DOWNLOAD_DEBOUNCE_SECONDS=60
      - DOWNLOAD_MAX_WAIT_SECONDS=120
      - DOWNLOAD_BUILD_LEASE_SECONDS=300
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:3001
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio-data:
  postgres-data:
  prometheus-data:
  grafana-data:
