# ============================================
# Changesets Version → PR → Publish workflow
# ============================================
#
# Flow:
#   Developer:  bunx changeset → commit + push to feature branch → open PR
#   CI (this):  detects changesets on main, opens a "Version Packages" PR
#   Reviewer:   merges the Version PR
#   CI (this):  detects the merge, runs `bun run release` which:
#               1. Bumps Helm chart appVersion
#               2. Creates git tags (per-package + unified v*)
#               3. Pushes tags → triggers release.yml (build + push images + helm)

name: Version or Publish

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  version-or-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch all history so changeset tag can see previous commits
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          title: "chore: release"
          commit: "chore: release"
          publish: bash scripts/release.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
