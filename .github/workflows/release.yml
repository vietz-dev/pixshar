name: Release

# ============================================
# Changesets-driven release. One workflow, no PAT.
#
# Flow:
#   dev:      bunx changeset → PR → merge to main
#   release:  changesets/action sees changesets → opens "chore: release" PR
#             (version.sh bumps every package.json + Helm chart)
#   merge:    the Version PR merges → no changesets left → publish.sh runs.
#             If v<version> not yet tagged, it signals published=true, which
#             fans out to build images + package Helm + create the GitHub Release.
#
# Everything runs in this single workflow, so the GITHUB_TOKEN
# "can't trigger another workflow" rule never bites us — no PAT needed.
# ============================================

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # version PR commit + create GitHub Release/tag
  pull-requests: write  # open the Version Packages PR
  packages: write       # push images + Helm chart to ghcr.io

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create Version PR or signal release
        id: changesets
        uses: changesets/action@v1
        with:
          version: bash scripts/version.sh
          publish: bash scripts/publish.sh
          title: "chore: release"
          commit: "chore: release"
          # We create one clean v<version> release ourselves in the helm job,
          # instead of the per-package releases this action would otherwise make.
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read released version
        id: version
        if: steps.changesets.outputs.published == 'true'
        run: echo "version=$(node -p "require('./packages/shared/package.json').version")" >> "$GITHUB_OUTPUT"

  images:
    name: Build & Push ${{ matrix.name }} image
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pixshar-${{ matrix.name }}
          tags: |
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=latest
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Package Helm & Create Release
    needs: [release, images]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm chart
        run: helm package helm/pixshar

      - name: Push Helm chart to ghcr.io
        run: helm push pixshar-*.tgz oci://ghcr.io/${{ github.repository_owner }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.release.outputs.version }}" \
            --title "v${{ needs.release.outputs.version }}" \
            --generate-notes
