# --- Global settings ---
nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

# --- Service Account ---
serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

# --- Database ---
# Pixshar uses Postgres. Recommended: link an existing managed Postgres (CNPG,
# RDS, …) via `externalDatabase`. For quick testing the chart can also spin up a
# single-replica `pixshar-postgres` StatefulSet by setting `postgres.enabled`.
#
# Bundled fallback Postgres — disabled by default; prefer an external DB.
postgres:
  enabled: false
  image: postgres:17-alpine
  auth:
    username: pixshar
    database: pixshar
    # Used to create the chart-managed secret when enabled and no existingSecret.
    password: ""
    # Reference an existing secret holding key `password` instead of the above.
    existingSecret: ""
  persistence:
    size: 8Gi
    storageClass: ""
  resources: {}

# External Postgres (used when postgres.enabled=false — the recommended path).
externalDatabase:
  # Option A (preferred — CNPG / openBAO): pull a ready-made DSN from a Secret.
  # CNPG publishes a full `postgres://…` connection string under the "uri" key of
  # its "<cluster>-app" secret; point existingSecret at it and you're done.
  existingSecret: ""
  existingSecretUrlKey: "uri"
  # Option B: assemble the DSN from parts; password comes from a Secret key.
  # Set existingSecretUrlKey: "" to use this path.
  host: ""
  port: 5432
  database: pixshar
  username: pixshar
  existingSecretPasswordKey: "password"
  sslmode: require

# --- API ---
# The Pixshar API (Hono + Bun + Prisma + Postgres).
api:
  enabled: true
  image:
    repository: ghcr.io/pixshar/pixshar-api
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 3001

  # Max concurrent image resize jobs per pod. Lower = less memory pressure.
  # Each slot uses ~50–200 MB depending on original file size.
  # At 2 slots with sequential variant resizes: ~300–400 MB peak for image work.
  processWorkerConcurrency: 2

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}

  podSecurityContext:
    fsGroup: 1001

  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  livenessProbe:
    httpGet:
      path: /health
      port: api
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: api
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  # Extra volumes for the API pod.
  extraVolumes: []
  extraVolumeMounts: []

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# --- Web ---
# The Pixshar frontend (Next.js 15).
# Proxies /api/* to the API service internally.
web:
  enabled: true
  image:
    repository: ghcr.io/pixshar/pixshar-web
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 3000

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}

  podSecurityContext:
    fsGroup: 1001

  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  livenessProbe:
    httpGet:
      path: /
      port: web
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: web
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  extraVolumes: []
  extraVolumeMounts: []

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# --- Secrets ---
# All sensitive values are stored in a Kubernetes Secret.
# For production, create the secret manually and set existingSecret.
# For quick testing, the chart can create the secret from values.
secrets:
  existingSecret: ""
  betterAuthSecret: ""
  adminEmail: "admin@example.com"
  adminPassword: ""
  s3AccessKey: ""
  s3SecretKey: ""

# --- Config ---
# Non-sensitive configuration values are stored in a ConfigMap.
# The webUrl must be the public URL guests use to reach the app.
# The apiUrl is the public URL for BetterAuth callbacks.
config:
  webUrl: "https://pixshar.local"
  apiUrl: "https://pixshar.local/api"
  betterAuthUrl: "https://pixshar.local/api"
  s3Endpoint: "https://s3.amazonaws.com"
  s3Bucket: "pixshar"
  s3Region: "us-east-1"
  s3PublicUrl: ""
  # Host the browser uses for presigned URLs (direct-to-S3 upload + display).
  # Leave empty when s3Endpoint is already reachable from the browser. Set this
  # if the API talks to S3 over an in-cluster/internal host the browser can't.
  # NOTE: the S3 bucket must allow CORS (GET/PUT/HEAD) from your web origin for
  # browser uploads to succeed.
  s3PublicEndpoint: ""
  downloadDebounceSeconds: 600

# --- Ingress ---
# The ingress routes all traffic to the web service.
# The web app proxies /api/* to the API service internally.
# If apiDirectRouting is true, /api/* is routed directly to the API
# service (bypassing the web proxy).
ingress:
  enabled: true
  className: nginx
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    # cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: pixshar.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: pixshar-tls
    #   hosts:
    #     - pixshar.local
  apiDirectRouting: true

# --- Gateway API HTTPRoute ---
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - pixshar.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
