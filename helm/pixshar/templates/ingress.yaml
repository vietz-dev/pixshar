{{- if .Values.ingress.enabled -}}
{{- $webSvcName := include "pixshar.web.fullname" . }}
{{- $webSvcPort := .Values.web.port }}
{{- $apiSvcName := include "pixshar.api.fullname" . }}
{{- $apiSvcPort := .Values.api.port }}
{{- $apiDirect := .Values.ingress.apiDirectRouting }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pixshar.fullname" . }}
  labels:
    {{- include "pixshar.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- if $apiDirect }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ $apiSvcName }}
                port:
                  number: {{ $apiSvcPort }}
          {{- end }}
          {{- range .paths }}
          - path: {{ .path }}
            {{- with .pathType }}
            pathType: {{ . }}
            {{- end }}
            backend:
              service:
                name: {{ $webSvcName }}
                port:
                  number: {{ $webSvcPort }}
          {{- end }}
    {{- end }}
{{- end }}
