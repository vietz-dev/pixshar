{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pixshar.fullname" . }}
  labels:
    {{- include "pixshar.labels" . | nindent 4 }}
type: Opaque
stringData:
  BETTER_AUTH_SECRET: {{ .Values.secrets.betterAuthSecret | required "secrets.betterAuthSecret is required when secrets.existingSecret is not set" | quote }}
  ADMIN_EMAIL: {{ .Values.secrets.adminEmail | quote }}
  ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | required "secrets.adminPassword is required when secrets.existingSecret is not set" | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.s3AccessKey | required "secrets.s3AccessKey is required when secrets.existingSecret is not set" | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.s3SecretKey | required "secrets.s3SecretKey is required when secrets.existingSecret is not set" | quote }}
{{- end }}
